<!DOCTYPE html>
<html>
<head>
    <title>AI Meeting Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        h1 {
            color: #38bdf8;
        }
        .box {
            background: #1e293b;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>AI Meeting Analyzer</h1>

    <div class="box">
        <h2>Transcript</h2>
        <p>{{ transcript }}</p>
    </div>

    <div class="box">
        <h2>Summary</h2>
        <p>{{ summary }}</p>
    </div>

</body>
</html>
